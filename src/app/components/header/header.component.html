<header class="header">
    <div class="container">
        <nav class="navbar">
            <button class="logo" (click)="scrollTo('home')" aria-label="Go to home section">
                <span class="logo-text">Gokul</span>
            </button>

            <div class="nav-menu" [class.active]="menuOpen">
                <a (click)="scrollTo('home')" class="nav-link">Home</a>
                <a (click)="scrollTo('services')" class="nav-link">Services</a>
                <a (click)="scrollTo('about')" class="nav-link">About</a>
                <a (click)="scrollTo('skills')" class="nav-link">Skills</a>
                <a (click)="scrollTo('portfolio')" class="nav-link">Projects</a>
                <a (click)="scrollTo('contact')" class="nav-link">Contact</a>
            </div>

            <div class="nav-controls">
                <button class="theme-toggle" (click)="toggleTheme()" aria-label="Toggle theme">
                    <i class="fas" [class.fa-sun]="(currentTheme$ | async) === 'dark'" [class.fa-moon]="(currentTheme$ | async) === 'light'"></i>
                </button>
                <button class="btn btn-primary nav-cta" (click)="scrollTo('contact')">Hire Me</button>

                <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </div>
</header>
